kind = "web"
previewPath = "/"
title = "SaaS Website"
version = "1.0.0"
id = "artifacts/saas-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24877
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/saas-website run dev"

[services.env]
PORT = "24877"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/saas-website", "run", "build"]
publicDir = "artifacts/saas-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
